<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fontadd -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwindcssadd -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GitHub Issues Tracker | Login</title>
</head>

<body style='font-family: "Geist", sans-serif;' class="bg-gray-300 min-h-screen flex items-center">
    <!-- login page -->
     <form onsubmit="return login()" class="bg-white w-96 rounded-lg shadow-lg mx-auto my-20 flex flex-col items-center justify-center">
        <div class="flex flex-col items-center justify-center">
            <div class="w-20 h-20 mt-10">
                <img src="assets/github-logo.png" alt="">
            </div>
            <div class="mt-4">
                <h2 class="text-xl font-semibold text-center">GitHub Issues Tracker</h2>
                <p class="text-gray-600 text-center">Sign in to manage your issues</p>
            </div>
        </div>
        <div class="w-3/4 my-10 flex flex-col">
            <label for="username">Username</label>
            <input placeholder="Enter Username" type="text" id="username" class="border border-gray-300 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <label for="password" class="mt-4">Password</label>
            <input placeholder="Enter Password" type="password" id="password" class="border border-gray-300 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="bg-purple-600 text-white rounded-md py-2 my-6 hover:bg-purple-800 transition duration-300">Sign In</button>
            <h3 class="text-center text-gray-500">OR</h3>
            <!-- forget password -->
            <a href="#" class="text-gray-400 text-center">forgot password!</a>

        </div>
     </form>
     <script src="script/login.js"></script>
</body>

</html>
