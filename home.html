<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fontadd -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwindcssadd -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GitHub Issues Tracker | Login</title>
</head>

<body style='font-family: "Geist", sans-serif' class="bg-gray-100 md:sm:pb-10 ">
    <header class="mb-4">
        <nav class="bg-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 py-3">

                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">

                    <!-- Logo -->
                    <div class="text-xl font-bold text-gray-700">
                        <a class="btn btn-ghost text-xl"><img class="w-8 h-8" src="assets/github-logo.png" alt="">
                            GitHub
                            Issues
                            Tracker</a>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                        <div
                            class="input input-bordered border rounded-lg px-4 py-2 w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <i class="fa-brands fa-sistrix"></i>
                            <input type="text" placeholder="Search..." />
                        </div>
                        <button class="btn bg-[#4A00FF] text-white"><i class="fa-solid fa-plus"></i> New Issue </button>
                    </div>

                </div>
            </div>
        </nav>
    </header>

    <section class=" navbar bg-base-100 drop-shadow-lg mb-1.5 md:sm:w-11/12 mx-auto rounded-lg">
        <button class="btn bg-[#4A00FF] text-white text-gray-500 px-8 mx-2">All</button>
        <button class="btn text-gray-500 px-8 mx-2">Open</button>
        <button class="btn text-gray-500 px-8 mx-2">Closed</button>
    </section>

    <section class="bg-base-100 drop-shadow-lg mb-0.5 md:sm:w-11/12 mx-auto rounded-t-lg">
        <div class="flex justify-between p-5">
            <div class="flex gap-3 items-center">
                <div class="h-10 w-10 relative">
                    <img class="h-[100%] w-[100%] object-cover rounded-full border-6 border-gray-300 bg-white absolute "
                        src="assets/Aperture.png" alt="">
                </div>
                <div>
                    <h3 id="issues_num" class="text-2xl font-bold text-gray-700">50 Issues</h3>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-6 text-sm text-gray-600">

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    <span>Open</span>
                </div>

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    <span>Closed</span>
                </div>

            </div>
        </div>
    </section>

    <section class="bg-base-100 drop-shadow-lg mb-14 md:sm:w-11/12 mx-auto p-3">

        <!-- Grid Container -->
        <div id="item_card" class="max-w-7xl mx-auto grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
            <!-- card -->
            
        </div>
    </section>




    <script src="script/home.js"></script>
</body>

</html>
